stages:
  - pre-commit-hooks
  - check
  - test
  - analysis
  - build

variables:
  CI_REGISTRY: gitlab.sintef.no:5050
  IMAGE_PATH: $CI_REGISTRY/$CI_PROJECT_NAMESPACE/$CI_PROJECT_NAME
  DOCKER_TLS_CERTDIR: ""

.base-rules:
  rules:
    # Do not run when creating tags
    - if: $CI_COMMIT_TAG
      when: never
    # Always run on default branch (main)
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: always
    # Run on merge requests
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always
    # Avoid duplicate jobs on merge requests
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    # Run if on a branch and not a merge request
    - if: $CI_COMMIT_BRANCH

# ─── Pre-commit hooks ────────────────────────────────────────────────
pre-commit-hooks:
  stage: pre-commit-hooks
  image: python:3.11-slim-bookworm
  variables:
    PRE_COMMIT_AUTO_FIX: "1"
    PRE_COMMIT_DEDUPLICATE_MR_AND_BRANCH: "true"
  rules:
    - if: '$PRE_COMMIT_DEDUPLICATE_MR_AND_BRANCH == "true" && $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      exists:
        - .pre-commit-config.yaml
      when: on_success
    - if: "$CI_COMMIT_BRANCH"
      exists:
        - .pre-commit-config.yaml
      when: on_success
    - when: never
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git && rm -rf /var/lib/apt/lists/*
    - pip install --no-cache-dir pre-commit
  script: |
    status=0
    pre-commit run --all-files || status=$?

    if [[ $status -ne 0 ]]; then
        if [[ -n "$CI_COMMIT_BRANCH" ]]; then
            git remote set-url origin "https://gitlab-ci-token:${PRE_COMMIT_ACCESS_TOKEN:-$CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
            git fetch origin
            git checkout $CI_COMMIT_BRANCH
        fi
        if [[ -n "$CI_MERGE_REQUEST_IID" ]]; then
            git remote set-url origin "https://gitlab-ci-token:${PRE_COMMIT_ACCESS_TOKEN:-$CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_MERGE_REQUEST_SOURCE_PROJECT_PATH}.git"
            git fetch origin
        fi
        pre-commit run --all-files  # re-run to check if autofix resolved everything
    else
        exit 0  # all good
    fi

    if [[ -z "$PRE_COMMIT_AUTO_FIX" ]]; then
        exit 1 # fail the job
    fi

    git config --global user.email "$GITLAB_USER_EMAIL"
    git config --global user.name "pre-commit fix $GITLAB_USER_NAME"

    if [[ -z "$PRE_COMMIT_ACCESS_TOKEN" ]]; then
        echo "Auto-fix is enabled, but no pre-commit access token found." >> /dev/stderr
        echo "To enable automatic fixes, please create a project access token with repository write scope and set the PRE_COMMIT_ACCESS_TOKEN variable" > /dev/stderr
        exit 1
    fi

    if [[ -n "$CI_COMMIT_BRANCH" ]]; then
        git add -u .
        git commit -m "auto fixes from pre-commit CI job" -m "job url: $CI_JOB_URL"
        git push
        exit 1
    elif [[ -n "$CI_MERGE_REQUEST_IID" ]]; then
        git add -u .
        git commit -m "auto fixes from pre-commit CI job" -m "job url: $CI_JOB_URL"
        git push origin HEAD:"$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME"
        exit 1
    else
       echo "Auto fix is not supported in this context" > /dev/stderr
       echo "Auto fix is only available in branch and merge request pipelines" > /dev/stderr
       exit 1
    fi

# ─── Check ────────────────────────────────────────────────────────────
check:
  stage: check
  image: alpine:latest
  script:
    - echo "This step always passes."
  rules:
    - when: always

# ─── Tests ────────────────────────────────────────────────────────────
pytest:
  stage: test
  extends: .base-rules
  image: python:3.11
  before_script:
    - pip install uv
    - uv pip install --system -e .
  script:
    - uv pip install --system junit-xml
    - pytest --junitxml=junit.xml -m "not slow and not gitlab_exempt"
  artifacts:
    when: always
    expire_in: 1 weeks
    paths:
      - junit.xml
    reports:
      junit: junit.xml

coverage:
  stage: test
  extends: .base-rules
  image: python:3.11
  before_script:
    - pip install uv
    - uv pip install --system -e .
  dependencies:
    - pytest
  script:
    - uv pip install --system coverage coverage-badge
    - coverage run -m pytest -m "not slow and not gitlab_exempt"
    - coverage report
    - coverage xml -o coverage.xml
    - coverage-badge -o coverage.svg
  coverage: '/^TOTAL.*\s+(\d+\%)$/'
  artifacts:
    name: ${CI_PROJECT_NAME}-${CI_JOB_NAME}-${CI_COMMIT_REF_NAME}-${CI_COMMIT_SHORT_SHA}
    expire_in: 1 week
    paths:
      - coverage.xml
      - coverage.svg
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

# ─── Analysis ─────────────────────────────────────────────────────────
sonarqube:
  stage: analysis
  extends: .base-rules
  dependencies:
    - coverage
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  variables:
    SONAR_USER_HOME: .sonar
    GIT_DEPTH: "0"
  cache:
    key: $CI_JOB_NAME
    paths:
      - .sonar/cache
  script:
    - pwd
    - ls -la
    - sonar-scanner
  allow_failure: true

# ─── Build ────────────────────────────────────────────────────────────
# Build SINDIT Docker image when a tag starting with "v" is created
# To trigger:
#   git tag v2.0.18 && git push origin v2.0.18
# The image will be tagged with: 2.0.18 (version without prefix) and latest
docker-build-sindit:
  stage: build
  image: docker:latest
  tags:
    - dind
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375/
    DOCKER_DRIVER: overlay2
    IMAGE_NAME: sindit
  allow_failure: false
  before_script:
    - |
      echo "$CI_JOB_TOKEN" | docker login $CI_REGISTRY \
      -u $CI_REGISTRY_USER --password-stdin
    - docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
    - docker buildx create --name mybuilder --use
    - export VERSION=${CI_COMMIT_TAG#v}
  script:
    docker buildx build
      --push
      --platform linux/amd64,linux/arm64/v8
      --provenance=false
      --label "git-commit-sha=$CI_COMMIT_SHA"
      --label "git-commit-branch=$CI_COMMIT_BRANCH"
      --label "git-commit-timestamp=$CI_COMMIT_TIMESTAMP"
      --label "git-commit-title=$CI_COMMIT_TITLE"
      -t $IMAGE_PATH/$IMAGE_NAME:$VERSION
      -t $IMAGE_PATH/$IMAGE_NAME:latest .
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/

# Build GraphDB Docker image when a tag starting with "graphdb-" is created
# To trigger:
#   git tag graphdb-2.0.18 && git push origin graphdb-2.0.18
docker-build-graphdb:
  stage: build
  image: docker:latest
  tags:
    - dind
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375/
    DOCKER_DRIVER: overlay2
    IMAGE_NAME: sindit-graphdb
  allow_failure: false
  before_script:
    - |
      echo "$CI_JOB_TOKEN" | docker login $CI_REGISTRY \
      -u $CI_REGISTRY_USER --password-stdin
    - docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
    - docker buildx create --name mybuilder --use
    - export VERSION=$(echo $CI_COMMIT_TAG | sed 's/^graphdb-//')
  script:
    docker buildx build
      --push
      --platform linux/arm64/v8,linux/amd64
      --provenance=false
      --label "git-commit-sha=$CI_COMMIT_SHA"
      --label "git-commit-branch=$CI_COMMIT_BRANCH"
      --label "git-commit-timestamp=$CI_COMMIT_TIMESTAMP"
      --label "git-commit-title=$CI_COMMIT_TITLE"
      -t $IMAGE_PATH/$IMAGE_NAME:$VERSION
      -t $IMAGE_PATH/$IMAGE_NAME:latest
      ./GraphDB
  rules:
    - if: $CI_COMMIT_TAG =~ /^graphdb-/

push-to-github:
  stage: build
  image: alpine:latest
  before_script:
    - apk add --no-cache git openssh
    - git config --global user.email "ci@sindit.com"
    - git config --global user.name "SINDIT CI"
  script:
    - git push --force https://$GITHUB_TOKEN@github.com/SINTEF-9012/SINDIT20.git HEAD:main
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
