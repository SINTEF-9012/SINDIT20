# Local development compose for the all-in-one Keycloak + PostgreSQL image.
# Both services run inside a single container; PostgreSQL data is persisted in a volume.
#
# Build & start: docker compose --env-file .env -f docker-compose.keycloak.yaml up -d --build
# Logs:          docker compose -f docker-compose.keycloak.yaml logs -f keycloak

services:
  keycloak:
    build: .
    environment:
      KC_DB_NAME: ${KC_DB_NAME:-keycloak}
      KC_DB_USERNAME: ${KC_DB_USERNAME:?KC_DB_USERNAME is required}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:?KC_DB_PASSWORD is required}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:?KC_BOOTSTRAP_ADMIN_USERNAME is required}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD:?KC_BOOTSTRAP_ADMIN_PASSWORD is required}
      KC_HOSTNAME_STRICT: "false"
    volumes:
      - data_postgres:/var/lib/postgresql/data
    ports:
      - "${KC_HTTP_BIND:-0.0.0.0}:${KC_HTTP_HOST_PORT:-8081}:8080"
      - "9000:9000"
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/9000"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s
    restart: unless-stopped

volumes:
  data_postgres:
